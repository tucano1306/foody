services:
  - type: web
    name: foody-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @foody/api build
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_URL
        sync: false
      - key: PORT
        value: 3001
